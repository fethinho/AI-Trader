name: Run Jupyter Notebook

on:
  workflow_dispatch: 
  push:
    branches: [ main ] 

jobs:
  run-code:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu kopyala
      uses: actions/checkout@v4

    - name: Python kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
- name: Kütüphaneleri kur
  run: |
    python -m pip install --upgrade pip
    pip install jupyter nbconvert yfinance pandas
    pip install pandas-ta
    
        
    - name: Kodu çalıştır
      run: |
        jupyter nbconvert --to notebook --execute "fethinho_Ai_.ipynb"
