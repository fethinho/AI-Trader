name: Sabah tarama ve Telegram

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '56 6 * * 1-5'
  workflow_dispatch:

jobs:
  run-scan-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4

      - name: Repo dosyalarini listele
        shell: bash
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gereksinimleri yukle
        continue-on-error: true
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install jupyter nbconvert yfinance pandas pandas-ta

      - name: Notebook calistir ve log kaydet
        id: tarama
        continue-on-error: true
        shell: bash
        run: |
          jupyter nbconvert --to notebook --execute "sarma.ipynb" --output "sarma-ran.ipynb" > tarama_log.txt 2>&1
          echo "TARAMA_EXIT=$?" >> "$GITHUB_ENV"

      - name: Log yoksa olustur
        if: always()
        shell: bash
        run: |
          if [ ! -f tarama_log.txt ]; then
            echo "tarama_log.txt olusmadi" > tarama_log.txt
          fi

      - name: Telegram mesaji hazirla
        if: always()
        shell: bash
        run: |
          {
            echo "Gunluk tarama tamamlandi"
            echo "Repo: ${{ github.repository }}"
            echo "Run: ${{ github.run_number }}"
            echo "Python exit code: ${TARAMA_EXIT}"
            echo ""
            echo "Log son 40 satir:"
            tail -n 40 tarama_log.txt
          } > telegram_message.txt

      - name: Telegram'a mesaj gonder
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message_file: telegram_message.txt
          document: tarama_log.txt
