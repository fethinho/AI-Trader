name: Sabah tarama ve Telegram

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '56 6 * * 1-5'
  workflow_dispatch:

jobs:
  run-scan-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gereksinimleri yukle
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install jupyter nbconvert yfinance pandas pandas-ta

      - name: Taramayi calistir ve ciktiyi kaydet
        shell: bash
        run: |
          set +e
          python taram.py > tarama_log.txt 2>&1
          TARAMA_EXIT=$?
          echo "TARAMA_EXIT=$TARAMA_EXIT" >> "$GITHUB_ENV"
          exit 0

      - name: Telegram mesaji hazirla
        shell: bash
        run: |
          {
            echo "*Gunluk tarama tamamlandi*"
            echo "Repo: \`${{ github.repository }}\`"
            echo "Run: \`${{ github.run_number }}\`"
            echo "Python exit code: \`${TARAMA_EXIT}\`"
            echo
            echo "*Log son 40 satir:*"
            echo '```text'
            tail -n 40 tarama_log.txt
            echo '```'
          } > telegram_message.txt

      - name: Telegram'a mesaj gonder
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message_file: telegram_message.txt
          document: tarama_log.txt
