name: Sabah tarama ve Telegram

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '56 6 * * 1-5'   # Hafta ici her gun 09:56 TR
  workflow_dispatch:

jobs:
  run-scan-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gereksinimleri yukle
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install jupyter nbconvert yfinance pandas pandas-ta

      - name: Taramayi calistir ve ciktiyi kaydet
        id: tarama
        shell: bash
        run: |
          set +e
          python taram.py 2>&1 | tee tarama_log.txt
          TARAMA_EXIT=${PIPESTATUS[0]}
          echo "TARAMA_EXIT=$TARAMA_EXIT" >> "$GITHUB_ENV"

          {
            echo "LOG_TAIL<<EOF"
            tail -n 40 tarama_log.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          exit 0

      - name: Telegram'a mesaj gonder
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *Gunluk tarama tamamlandi*
            Repo: `${{ github.repository }}`
            Run: `${{ github.run_number }}`
            Python exit code: `${{ env.TARAMA_EXIT }}`

            *Log son 40 satir:*
            ```text
            ${{ steps.tarama.outputs.LOG_TAIL }}
            ```
          document: tarama_log.txt
