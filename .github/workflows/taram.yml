name: Sabah tarama ve Telegram

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '56 6 * * 1-5'
  workflow_dispatch:

jobs:
  run-scan-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Taramayi calistir ve log tut
        id: tarama
        continue-on-error: true
        shell: bash
        run: |
          touch tarama_log.txt
          exec > >(tee -a tarama_log.txt) 2>&1

          echo "=== BASLADI ==="
          echo "pwd:"
          pwd
          echo "repo dosyalari:"
          find . -maxdepth 2 -type f | sort

          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install nbconvert nbformat ipykernel jupyter_client jupyter_core yfinance pandas pandas-ta

          echo "=== NOTEBOOK CALISIYOR ==="
          python -m nbconvert --to notebook --execute "sarma.ipynb" --output "sarma-ran.ipynb"

          EXIT_CODE=$?
          echo "TARAMA_EXIT=$EXIT_CODE" >> "$GITHUB_ENV"
          echo "=== BITTI, EXIT_CODE=$EXIT_CODE ==="

      - name: Exit code yoksa varsayilan ata
        if: always()
        shell: bash
        run: |
          if [ -z "${TARAMA_EXIT}" ]; then
            echo "TARAMA_EXIT=999" >> "$GITHUB_ENV"
          fi
          if [ ! -f tarama_log.txt ]; then
            echo "tarama_log.txt olusmadi" > tarama_log.txt
          fi

      - name: Telegram mesaji hazirla
        if: always()
        shell: bash
        run: |
          {
            echo "Gunluk tarama tamamlandi"
            echo "Repo: ${{ github.repository }}"
            echo "Run: ${{ github.run_number }}"
            echo "Python exit code: ${TARAMA_EXIT}"
            echo ""
            echo "Log son 40 satir:"
            tail -n 40 tarama_log.txt
          } > telegram_message.txt

      - name: Telegram'a mesaj gonder
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message_file: telegram_message.txt
          document: tarama_log.txt
